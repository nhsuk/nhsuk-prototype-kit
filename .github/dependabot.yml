version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 4
    ignore:
      # SASS updates will be done manually in sync with
      # NHS Frontend to avoid deprecation warnings.
      - dependency-name: 'sass-embedded'
